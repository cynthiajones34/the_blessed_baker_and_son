<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Blessed Baker and Son</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream:      #FFFBF6;
      --blush:      #FDF0E8;
      --rose:       #C97B5A;
      --terracotta: #C47D63;
      --berry:      #A84C6F;
      --chocolate:  #7A5540;
      --gold:       #C9AA72;
      --gold-light: #E8D4A8;
      --white:      #FFFDF9;
      --text:       #3D2510;
      --muted:      #A88070;
      --serif:  'Playfair Display', Georgia, serif;
      --script: 'Pinyon Script', cursive;
      --sans:   'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--cream); color: var(--text); overflow-x: hidden; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.6rem 3rem;
      background: rgba(250,245,238,0.95); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(199,167,108,0.2);
    }
    .nav-logo img { height: 54px; width: auto; mix-blend-mode: multiply; display: block; }
    .nav-links { display: flex; gap: 2rem; list-style: none; align-items: center; }
    .nav-links a {
      font-family: var(--sans); font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text); text-decoration: none; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--rose); }
    .nav-cta {
      background: transparent; color: var(--terracotta) !important;
      padding: 0.5rem 1.3rem; border-radius: 2px;
      border: 1.5px solid var(--terracotta);
    }
    .nav-cta:hover { background: var(--blush) !important; color: var(--terracotta) !important; }

    .btn-primary {
      background: transparent; color: var(--terracotta);
      padding: 0.9rem 2rem; font-family: var(--sans); font-size: 0.82rem;
      font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
      border: 1.5px solid var(--terracotta); border-radius: 2px; cursor: pointer;
      text-decoration: none; display: inline-block; transition: all 0.2s;
    }
    .btn-primary:hover { background: var(--blush); transform: translateY(-1px); }
    .btn-outline {
      background: transparent; color: var(--terracotta);
      padding: 0.9rem 2rem; font-family: var(--sans); font-size: 0.82rem;
      font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
      border: 1.5px solid var(--rose); border-radius: 2px; cursor: pointer;
      text-decoration: none; display: inline-block; transition: all 0.2s;
    }
    .btn-outline:hover { background: var(--blush); }
    .section-tag {
      font-size: 0.72rem; font-weight: 500; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--rose); margin-bottom: 1rem;
    }
    .section-title {
      font-family: var(--serif); font-size: clamp(2rem, 3vw, 2.8rem);
      font-weight: 700; color: var(--chocolate); margin-bottom: 1rem; line-height: 1.15;
    }
    .section-title em { font-style: italic; color: var(--terracotta); }
    .section-sub {
      font-size: 1rem; color: var(--muted); max-width: 560px;
      margin: 0 auto 3.5rem; line-height: 1.75;
    }

    /* HERO */
    .hero {
      min-height: 100vh; display: flex;
      padding-top: 74px; background: var(--white); position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; top: -80px; right: -80px;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(199,123,90,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-left {
      display: flex; flex-direction: column; justify-content: center;
      padding: 5rem 3rem 5rem 4rem;
    }
    .hero-eyebrow {
      font-size: 0.72rem; font-weight: 500; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--rose); margin-bottom: 1.4rem;
      display: flex; align-items: center; gap: 0.8rem;
    }
    .hero-eyebrow::before { content: none; }
    .hero-headline {
      font-family: var(--serif); font-size: clamp(2.6rem, 4vw, 4rem);
      font-weight: 700; line-height: 1.1; color: var(--chocolate); margin-bottom: 0.4rem;
    }
    .hero-headline em { font-style: italic; color: var(--terracotta); }
    .hero-script {
      font-family: var(--script); font-size: clamp(2rem, 3vw, 3rem);
      color: var(--gold); line-height: 1; margin-bottom: 1.8rem;
    }
    .hero-sub {
      font-size: 1rem; line-height: 1.8; color: var(--muted);
      max-width: 420px; margin-bottom: 2rem;
    }
    .hero-legacy {
      display: inline-flex; align-items: center; gap: 0.8rem;
      background: transparent;
      padding: 0; border: none;
      margin-bottom: 2rem; max-width: 420px;
    }
    .hero-legacy-icon { font-size: 1.4rem; }
    .hero-legacy-text { font-size: 0.88rem; color: var(--berry); line-height: 1.5; }
    .hero-legacy-text strong { display: block; font-family: var(--serif); font-size: 1rem; }
    .hero-buttons { display: flex; gap: 1rem; flex-wrap: wrap; }

    .hero-right {
      background: var(--white); display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 4rem 2rem; position: relative; width: 100%;
    }
    .hero-logo-wrap {
      width: 60%; max-width: 600px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      margin-bottom: 0;
    }
    .hero-logo-wrap img {
      width: 100%; height: auto; mix-blend-mode: multiply;
    }
    .hero-tagline {
      font-family: var(--script); font-size: 1.8rem; color: var(--berry);
      text-align: center; line-height: 1.3;
    }

    /* INTRO BAND */
    .intro-band {
      background: var(--blush); padding: 3.5rem 4rem;
      display: flex; flex-direction: column; align-items: center; text-align: center;
    }
    .intro-band-quote {
      font-family: var(--script); font-size: 3rem; color: var(--gold);
      flex: 0 0 auto; line-height: 1.1; white-space: nowrap;
    }
    .intro-band-divider {
      width: 1px; height: 50px; background: rgba(180,120,90,0.3); flex: 0 0 auto;
    }
    .intro-band-text {
      font-size: 1rem; color: var(--text); line-height: 1.8; max-width: 640px; text-align: center;
    }
    .intro-band-text strong { color: var(--rose); font-weight: 600; }

    /* STORY */
    .story {
      padding: 7rem 4rem; display: grid; grid-template-columns: 1fr 1fr;
      gap: 5rem; align-items: center; background: var(--white);
    }
    .story-tag {
      font-size: 0.72rem; font-weight: 500; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--rose); margin-bottom: 1.2rem;
    }
    .story h2 {
      font-family: var(--serif); font-size: clamp(2rem, 3vw, 2.6rem);
      font-weight: 700; color: var(--chocolate); line-height: 1.2; margin-bottom: 1.6rem;
    }
    .story h2 em { font-style: italic; color: var(--terracotta); }
    .story p {
      font-size: 1rem; line-height: 1.85; color: var(--muted); margin-bottom: 1.2rem;
    }
    .story-pull {
      background: transparent; border-left: 3px solid var(--gold);
      padding: 1.4rem 1.8rem; font-family: var(--serif); font-size: 1.1rem;
      font-style: italic; color: var(--berry); line-height: 1.6; border-radius: 0 4px 4px 0;
    }
    .story-visual { display: flex; flex-direction: column; gap: 1.2rem; }
    .story-card {
      background: var(--cream); border-radius: 4px; padding: 1.6rem;
      display: flex; align-items: flex-start; gap: 1rem;
    }
    .story-card-icon { font-size: 1.8rem; flex: 0 0 auto; }
    .story-card h3 {
      font-family: var(--serif); font-size: 1.05rem; color: var(--chocolate); margin-bottom: 0.3rem;
    }
    .story-card p { font-size: 0.88rem; color: var(--muted); line-height: 1.6; margin: 0; }

    /* HOW IT WORKS */
    .how { background: var(--cream); padding: 7rem 4rem; text-align: center; }
    .how-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem;
      max-width: 1100px; margin: 0 auto;
    }
    .how-step { position: relative; border-left: 3px solid var(--gold); padding-left: 1.2rem; text-align: left; }
    .how-step-num {
      display: none;
    }
    .how-step h3 { font-family: var(--serif); font-size: 1rem; color: var(--chocolate); margin-bottom: 0.5rem; }
    .how-step p { font-size: 0.86rem; line-height: 1.7; color: var(--muted); }
    .how-step-arrow {
      position: absolute; top: 8px; right: -1rem; color: var(--gold); font-size: 1.1rem;
    }
    .how-step:last-child .how-step-arrow { display: none; }
    .how-thread-label { font-family: var(--sans); font-size: 0.75rem; color: var(--rose); text-align: center; margin: 2.5rem 0 1.5rem; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 600; }

    /* MENU */
    .menu { background: var(--cream); padding: 7rem 4rem; color: var(--text); }
    .menu .section-tag { text-align: center; color: var(--rose); }
    .menu .section-title { text-align: center; color: var(--text); }
    .menu .section-title em { color: var(--terracotta); }
    .menu .section-sub { text-align: center; color: var(--muted); }

    .menu-categories { max-width: 1100px; margin: 0 auto; }
    .menu-category { margin-bottom: 3.5rem; }
    .menu-category-header {
      display: flex; align-items: center; gap: 1.2rem; margin-bottom: 1.5rem;
      padding-bottom: 0.8rem; border-bottom: 1px solid rgba(180,120,90,0.2);
    }
    .menu-category-icon { font-size: 1.5rem; }
    .menu-category-title {
      font-family: var(--serif); font-size: 1.3rem; color: var(--chocolate); font-weight: 600;
    }
    .menu-category-note {
      font-size: 0.8rem; color: var(--muted); font-style: italic; margin-left: auto;
    }
    .menu-items-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
    .menu-item {
      background: var(--white); border: 1px solid rgba(180,120,90,0.18);
      border-radius: 4px; padding: 1.3rem 1.5rem;
      display: flex; justify-content: space-between; align-items: center; min-width: 260px; max-width: 340px; flex: 0 1 300px;
      transition: background 0.2s;
    }
    .menu-item:hover { background: var(--blush); }
    .menu-item-name { font-size: 0.95rem; color: var(--text); }
    .menu-item-price {
      font-family: var(--serif); font-size: 1.1rem; color: var(--gold);
      font-weight: 600; white-space: nowrap;
    }
    .menu-item-sub { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }
    .menu-note {
      font-size: 0.8rem; color: var(--muted); font-style: italic;
      margin-top: 0.8rem; text-align: center;
    }
    .menu-cta { text-align: center; margin-top: 3rem; }
    .menu-cta p { color: var(--muted); font-size: 0.86rem; margin-top: 0.8rem; }

    /* ORDER TYPES */
    .order-types { background: var(--white); padding: 7rem 4rem; text-align: center; }
    .order-cards {
      display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem;
      max-width: 900px; margin: 0 auto;
    }
    .order-type-card {
      border: 1.5px solid rgba(199,167,108,0.3); border-radius: 4px;
      padding: 3rem 2.5rem; background: var(--cream);
      text-decoration: none; color: inherit; position: relative; overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .order-type-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 4px; background: var(--terracotta);
    }
    .order-type-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(61,30,30,0.1); }
    .order-type-icon { font-size: 2.5rem; margin-bottom: 1.2rem; }
    .order-type-card h3 {
      font-family: var(--serif); font-size: 1.4rem; color: var(--chocolate); margin-bottom: 0.8rem;
    }
    .order-type-card p { font-size: 0.9rem; color: var(--muted); line-height: 1.7; margin-bottom: 1.8rem; }
    .order-type-detail {
      font-size: 0.8rem; color: var(--rose); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500;
    }

    /* SCHOOLS */
    .schools { background: var(--cream); padding: 6rem 4rem; text-align: center; }
    .schools-grid { display: flex; justify-content: center; gap: 1.2rem; flex-wrap: wrap; margin-top: 2.5rem; }
    .school-chip {
      background: var(--white); border: 1px solid rgba(199,167,108,0.35);
      border-radius: 100px; padding: 0.65rem 1.6rem; font-size: 0.88rem;
      color: var(--berry); font-weight: 500; display: flex; align-items: center; gap: 0.5rem;
    }
    .school-chip::before { content: '🏫'; font-size: 0.88rem; }
    .schools-note {
      margin-top: 1.8rem; font-size: 0.86rem; color: var(--muted); max-width: 480px;
      margin-left: auto; margin-right: auto;
    }
    .schools-note a { color: var(--rose); text-decoration: none; }

    /* CUSTOM */
    .custom { background: var(--blush); padding: 7rem 4rem; display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: start; }
    .custom h2 {
      font-family: var(--serif); font-size: clamp(1.8rem, 3vw, 2.6rem);
      font-weight: 700; color: var(--chocolate); line-height: 1.2; margin-bottom: 1.2rem;
    }
    .custom h2 em { font-style: italic; color: var(--terracotta); }
    .custom p { font-size: 1rem; line-height: 1.8; color: var(--muted); margin-bottom: 1.8rem; }
    .custom-feature {
      display: flex; align-items: center; gap: 0.8rem;
      font-size: 0.9rem; color: var(--text); margin-bottom: 0.6rem;
    }
    .custom-feature::before { content: 'star'; font-family: 'Material Symbols Outlined'; color: var(--gold); font-size: 1rem; }

    /* CTA BAND */
    .cta-band {
      background: var(--blush); padding: 7rem 4rem; display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center;
    }

    .cta-band h2 {
      font-family: var(--serif); font-size: clamp(2rem, 3vw, 2.6rem);
      font-weight: 700; color: var(--chocolate); line-height: 1.2; margin-bottom: 1.6rem;
    }
    .cta-band h2 em { font-style: italic; color: var(--terracotta); }
    .cta-band p { font-size: 1rem; line-height: 1.85; color: var(--muted); margin-bottom: 1.2rem; }
    .cta-band .story-tag { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--rose); margin-bottom: 1.2rem; }
    .btn-cta-white {
      background: transparent; color: var(--terracotta);
      padding: 0.9rem 2rem; font-family: var(--sans); font-size: 0.82rem;
      font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      border: 1.5px solid var(--terracotta); border-radius: 2px; cursor: pointer; text-decoration: none;
      display: inline-block; transition: all 0.2s;
    }
    .btn-cta-white:hover { background: var(--blush); }

    footer {
      background: #EDE3D8; padding: 3rem 4rem;
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid rgba(199,167,108,0.12);
    }
    .footer-logo img { height: 58px; width: auto; mix-blend-mode: screen; opacity: 0.8; }
    .footer-links { display: flex; gap: 2rem; list-style: none; }
    .footer-links a {
      font-size: 0.73rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--gold); }
    .footer-copy { font-size: 0.73rem; color: rgba(250,245,238,0.28); }

    .form-group select option { background: var(--white); color: var(--text); }
    #customConfirm { display:none; text-align:center; padding:1.5rem 0; }

    /* ── MOBILE RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 768px) {
      nav { padding: 0.6rem 1.5rem; }
      .nav-links li:not(:last-child):not(:nth-last-child(2)) { display: none; }
      .hero { flex-direction: column; min-height: auto; }
      .hero-right { width: 100%; padding: 2rem 1.5rem; order: -1; }
      .hero-logo-wrap { width: 70%; max-width: 280px; }
      .intro-band { flex-direction: column; padding: 3rem 1.5rem; gap: 1rem; text-align: center; }
      .intro-band-divider { display: none; }
      .intro-band-text { text-align: center; }
      .how, .menu, .order-types, .custom { padding: 4rem 1.5rem; }
      .how-grid { grid-template-columns: 1fr; gap: 2rem; }
      .how-step-arrow { display: block; position: static; text-align: center; margin: 0.2rem 0; font-size: 0; color: var(--gold); }
      .how-step-arrow::after { content: "↓"; font-size: 1.1rem; }
      .cta-band { grid-template-columns: 1fr; padding: 4rem 1.5rem; gap: 2.5rem; }
      .menu-items-grid { flex-direction: column; align-items: center; }
      .menu-item { max-width: 92vw; width: auto; flex-basis: auto; }
      .order-cards { grid-template-columns: 1fr; }
      .custom { grid-template-columns: 1fr; }
      footer { flex-direction: column; gap: 1.5rem; text-align: center; padding: 2.5rem 1.5rem; }
      .footer-links { flex-wrap: wrap; justify-content: center; gap: 1rem; }
      .section-title { font-size: clamp(1.6rem, 5vw, 2rem); }
    }
    @media (max-width: 480px) {
      .hero-logo-wrap { width: 80%; }
      .how, .menu, .order-types { padding: 3rem 1rem; }
      .cta-band { padding: 3rem 1rem; }
      .menu-item { min-width: unset; }
    }
  </style>
